unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*256col*:Tc"   # truecolor for the Nord palette

# split panes using | and - (open in the current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# quality-of-life
set -g mouse on
set -g base-index 1                # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on         # keep window numbers gap-free
set -g history-limit 50000
set -sg escape-time 10             # no lag for <Esc> in vim
set -g focus-events on
setw -g mode-keys vi               # vi-style copy mode
set -g set-clipboard on

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# reload config
bind r source-file ~/.tmux.conf \; display-message "  ~/.tmux.conf reloaded"

# fzf session switcher (replaces the stock choose-tree; needs tmux >= 3.2)
bind s display-popup -E -w 60% -h 50% "tmux list-sessions -F '#S' | fzf --reverse --prompt='session  ' | xargs -r tmux switch-client -t"

# ─── Nord theme ──────────────────────────────────────────────────────
# nord0 #2e3440  nord1 #3b4252  nord3 #4c566a  fg #d8dee9
# frost: nord8 #88c0d0  nord9 #81a1c1   aurora: green #a3be8c  yellow #ebcb8b
set -g pane-border-style 'fg=#3b4252'
set -g pane-active-border-style 'fg=#88c0d0'
setw -g mode-style 'fg=#2e3440 bg=#88c0d0 bold'
set -g message-style 'fg=#88c0d0 bg=#3b4252 bold'

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#2e3440 fg=#d8dee9'
set -g status-left-length 40
set -g status-right-length 80

# session name in a frost "pill" on the left
set -g status-left '#[fg=#2e3440,bg=#88c0d0,bold]  #S #[fg=#88c0d0,bg=#2e3440]'

# date + time on the right
set -g status-right '#[fg=#4c566a,bg=#2e3440]#[fg=#d8dee9,bg=#3b4252]  %a %d %b #[fg=#88c0d0,bg=#3b4252]#[fg=#2e3440,bg=#88c0d0,bold]  %H:%M '

setw -g window-status-separator ''
setw -g window-status-current-format '#[fg=#2e3440,bg=#81a1c1]#[fg=#2e3440,bg=#81a1c1,bold] #I #W#{?window_zoomed_flag, ,} #[fg=#81a1c1,bg=#2e3440]'
setw -g window-status-format '#[fg=#4c566a,bg=#2e3440]  #I #W  '
setw -g window-status-bell-style 'fg=#2e3440 bg=#ebcb8b bold'
